version: "3.9"

services:
  mongodb:
    image: mongo
    container_name: capstone-mongodb

    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Raunak@2
      MONGO_INITDB_DATABASE: capstone

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: